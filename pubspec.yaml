name: glysera
description: Glysera — AI-powered glucose monitoring, ISO-compliant.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  collection: ^1.18.0
  path_provider: ^2.1.3
  google_fonts: ^6.2.1
  lottie: ^3.1.0
  # flutter_svg: ^2.0.10+1  ← restore when flutter_svg supports iOS 26
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  ios: true
  android: false
  image_path: "assets/images/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/avatars/
    - assets/animations/